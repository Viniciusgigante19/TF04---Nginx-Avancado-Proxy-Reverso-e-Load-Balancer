<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Produtos</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1>Produtos</h1>
</header>

<main id="produtos"></main>

<script>
fetch("/api/")
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("produtos");

    data.products.forEach(p => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <h3>${p.name}</h3>
        <p>R$ ${p.price}</p>
        <small>ID: ${p.id}</small>
      `;
      container.appendChild(div);
    });
  });
</script>

</body>
</html>
